
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Inside containers, never use localhost for Postgres/Redis — use service names.
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/aimos
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/live')",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
      - ./prompts:/app/prompts
      - ./tests:/app/tests

  worker:
    build: .
    command: celery -A celery_app.celery worker --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/aimos
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
      - ./prompts:/app/prompts
      - ./tests:/app/tests

  beat:
    build: .
    command: celery -A celery_app.celery beat --loglevel=info
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/aimos
      REDIS_URL: redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
      - ./prompts:/app/prompts
      - ./tests:/app/tests

  redis:
    image: redis:7-alpine
    # Host 6380 avoids conflict when another Redis already uses 6379 on your machine.
    ports:
      - "6380:6379"

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aimos
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d aimos"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s
