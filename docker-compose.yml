
version: '3'
services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - redis
      - db

  worker:
    build: .
    command: celery -A celery_app.celery worker --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - db

  beat:
    build: .
    command: celery -A celery_app.celery beat --loglevel=info
    env_file:
      - .env
    depends_on:
      - redis
      - db

  redis:
    image: redis

  db:
    image: postgres
    environment:
      POSTGRES_DB: aimos
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
